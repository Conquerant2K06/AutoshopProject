{% extends 'base.html' %}
{% load static %}

{% block title %}Paiement Stripe - AutoShop{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm mt-5">
                <div class="card-header bg-primary text-white text-center">
                    <h3 class="mb-0">Paiement sécurisé</h3>
                </div>
                <div class="card-body">
                    <div class="text-center mb-4">
                        <h4>Montant à payer :</h4>
                        <h2 class="text-primary">{{ order.total_amount|floatformat:0 }} FCFA</h2>
                    </div>
                    
                    <form id="payment-form">
                        {% csrf_token %}
                        <div id="card-element" class="mb-3 p-3 border rounded"></div>
                        <div id="card-errors" class="text-danger mb-3"></div>
                        <button type="submit" class="btn btn-success w-100" id="submit-btn">
                            <i class="fas fa-lock"></i> Payer {{ order.total_amount|floatformat:0 }} FCFA
                        </button>
                    </form>
                    
                    <div class="mt-4 text-center">
                        <i class="fab fa-cc-visa fa-2x text-muted mx-2"></i>
                        <i class="fab fa-cc-mastercard fa-2x text-muted mx-2"></i>
                        <i class="fab fa-cc-amex fa-2x text-muted mx-2"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://js.stripe.com/v3/"></script>
<script>
    (function() {
        // Variables
        const stripe = Stripe('{{ stripe_public_key }}');
        const elements = stripe.elements();
        const card = elements.create('card');
        card.mount('#card-element');
        
        const form = document.getElementById('payment-form');
        const submitBtn = document.getElementById('submit-btn');
        const errorDiv = document.getElementById('card-errors');
        
        // Gestionnaire d'erreur de carte
        card.addEventListener('change', function(event) {
            if (event.error) {
                errorDiv.textContent = event.error.message;
            } else {
                errorDiv.textContent = '';
            }
        });
        
        // Gestionnaire de soumission
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Chargement...';
            
            try {
                // Créer le PaymentIntent
                const response = await fetch('/payments/stripe/create/{{ order.id }}/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                    }
                });
                
                const data = await response.json();
                
                if (data.error) {
                    errorDiv.textContent = data.error;
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Payer';
                    return;
                }
                
                // Confirmer le paiement
                const { error, paymentIntent } = await stripe.confirmCardPayment(data.clientSecret, {
                    payment_method: {
                        card: card
                    }
                });
                
                if (error) {
                    errorDiv.textContent = error.message;
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Payer';
                } else if (paymentIntent.status === 'succeeded') {
                    window.location.href = '/orders/confirmation/{{ order.id }}/';
                }
            } catch (err) {
                errorDiv.textContent = 'Erreur réseau. Veuillez réessayer.';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Payer';
            }
        });
    })();
</script>
{% endblock %}
